<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur de musique</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/8d7635617e.js" crossorigin="anonymous"></script>
</head>
<body>
        <div class="music-player">
            <div class="time-track">
                <span id="elapsed">0:00</span>
                <input type="range" id="track" min="0" value="0">
                <span id="track-time">4:00</span>
            </div>
            <div>
                <audio src="assets/Love is show.mp3"></audio>
                <i class="fa-solid fa-play" id="play-button"></i>
                <i class="fa-solid fa-pause" id="pause-button"></i>
                <i class="fa-solid fa-stop" id="stop-button"></i>
            </div>
            <div class="playlist-controls">
                <i class="fa-solid fa-backward" id="prev-button"></i>
                <i class="fa-solid fa-forward" id="next-button"></i>
            </div>
            <div class="volume-control">
                <input type="range" id="volume" min="0" max="1" value="1" step="0.1">
                <span id="volume-value">100%</span>
            </div>
        </div>
    
</body>
</html>
