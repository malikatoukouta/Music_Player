<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur de musique</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/8d7635617e.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="music-player">
        <div class="cover">
            <img id="cover-img" alt="" hidden>
            <i class="fa-solid fa-music cover-placeholder" id="cover-placeholder"></i>
        </div>

        <h2 id="current-track-title" class="track-title">Love is show</h2>

        <audio src="assets/Love is show.mp3"></audio>

        <div class="time-track">
            <span id="elapsed">0:00</span>
            <input type="range" id="track" min="0" value="0" aria-label="Progression">
            <span id="track-time">0:00</span>
        </div>

        <div class="main-controls">
            <i class="fa-solid fa-shuffle mode-button" id="shuffle-button" title="Lecture aléatoire"></i>
            <i class="fa-solid fa-backward" id="prev-button" title="Précédent"></i>
            <i class="fa-solid fa-play" id="play-button" title="Lecture"></i>
            <i class="fa-solid fa-pause" id="pause-button" title="Pause"></i>
            <i class="fa-solid fa-stop" id="stop-button" title="Stop"></i>
            <i class="fa-solid fa-forward" id="next-button" title="Suivant"></i>
            <span class="repeat-wrap">
                <i class="fa-solid fa-repeat mode-button" id="repeat-button" title="Répéter"></i>
                <span class="repeat-one-badge" id="repeat-one-badge" hidden>1</span>
            </span>
        </div>

        <div class="volume-control">
            <i class="fa-solid fa-volume-high"></i>
            <input type="range" id="volume" min="0" max="1" value="1" step="0.05" aria-label="Volume">
            <span id="volume-value">100%</span>
        </div>

        <ul id="playlist" class="playlist"></ul>

        <p class="shortcuts-hint">
            Espace : lecture/pause · ← → : piste · ↑ ↓ : volume
        </p>
    </div>
</body>
</html>
